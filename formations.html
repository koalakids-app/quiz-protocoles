<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-formations — Koalakids</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8621A;
  --orange-light:#FDF0E8;
  --orange-dark:#C45112;
  --purple:#4A3F9F;
  --purple-light:#EEEDFE;
  --bg:#FBF7F4;
  --surface:#FFFFFF;
  --surface-2:#FEF9F6;
  --border:rgba(232,98,26,0.15);
  --border-strong:rgba(232,98,26,0.3);
  --text:#2D1F0E;
  --text-muted:#7A5C3F;
  --text-light:#B8956A;
  --radius:10px;
  --success-bg:#EAF6EE;
  --success-border:#2EBD6A;
  --success-text:#0F6E35;
  --danger-bg:#FDF0EE;
  --danger-border:#E07060;
  --danger-text:#993C1D;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* HEADER */
.app-header{background:var(--purple);color:white;padding:.9rem 1.5rem;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(74,63,159,.25)}
.header-logo{height:44px;border-radius:6px;background:white;padding:3px 6px}
.header-title{flex:1}
.header-title h1{font-size:16px;font-weight:700;letter-spacing:-.2px}
.header-title p{font-size:11px;opacity:.75;margin-top:1px}
.header-score-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;white-space:nowrap}

/* CONTAINER */
.container{max-width:660px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* PROGRESS */
.progress-wrap{background:var(--surface);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;border:1px solid var(--border)}
.progress-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-label{font-size:13px;color:var(--text-muted)}
.progress-count{font-size:13px;font-weight:700;color:var(--orange)}
.progress-bar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),#F5963A);border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* QUESTION */
.question-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem}
.q-badge{display:inline-flex;align-items:center;gap:6px;background:var(--orange-light);color:var(--orange);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:20px;margin-bottom:12px;border:1px solid rgba(232,98,26,.2)}
.q-text{font-size:16px;font-weight:500;color:var(--text);line-height:1.55;margin-bottom:1.25rem}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s,background .15s,transform .1s;user-select:none}
.option:hover:not(.disabled){border-color:var(--orange);background:var(--orange-light);transform:translateX(3px)}
.option.selected{border-color:var(--orange);background:var(--orange-light)}
.option.correct{border-color:var(--success-border);background:var(--success-bg)}
.option.wrong{border-color:var(--danger-border);background:var(--danger-bg)}
.option.disabled{cursor:default;transform:none}
.option-letter{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-muted);flex-shrink:0;transition:all .15s;background:white}
.option.selected .option-letter{background:var(--orange);border-color:var(--orange);color:white}
.option.correct .option-letter{background:var(--success-border);border-color:var(--success-border);color:white}
.option.wrong .option-letter{background:var(--danger-border);border-color:var(--danger-border);color:white}
.option-text{font-size:14px;color:var(--text);line-height:1.4}

/* FEEDBACK */
.feedback{margin-top:12px;padding:10px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;display:none;align-items:flex-start;gap:8px}
.feedback.show{display:flex}
.feedback.ok{background:var(--success-bg);color:var(--success-text);border:1px solid var(--success-border)}
.feedback.ko{background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-border)}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:1.5px solid var(--border-strong);border-radius:var(--radius);background:white;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange);background:var(--orange-light)}
.btn:disabled{opacity:.35;cursor:default}
.btn.primary{background:var(--orange);color:white;border-color:var(--orange)}
.btn.primary:hover:not(:disabled){background:#D45715;border-color:#D45715;color:white}
.btn.purple{background:var(--purple);color:white;border-color:var(--purple)}
.btn.purple:hover:not(:disabled){background:#3D348E;border-color:#3D348E;color:white}
.pager{font-size:13px;color:var(--text-muted);font-weight:500}

/* START SCREEN */
.start-screen{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2.5rem 2rem;text-align:center}
.start-logo-wrap{margin:0 auto 1.5rem;display:flex;justify-content:center}
.start-logo-wrap img{height:80px}
.start-screen h2{font-size:22px;font-weight:700;color:var(--purple);margin-bottom:8px}
.start-screen .subtitle{font-size:15px;color:var(--text-muted);margin-bottom:2rem;line-height:1.6}
.start-meta{display:flex;justify-content:center;gap:20px;margin-bottom:2rem;flex-wrap:wrap}
.start-meta-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);background:var(--orange-light);padding:5px 14px;border-radius:20px;border:1px solid rgba(232,98,26,.2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0}

/* FORM */
.form-group{text-align:left;margin-bottom:1rem}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-input,.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border-strong);border-radius:var(--radius);font-size:15px;font-family:inherit;color:var(--text);background:white;transition:border-color .15s;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,98,26,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* RESULTS */
.results{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2rem 1.5rem;text-align:center}
.result-icon{font-size:52px;margin-bottom:8px}
.result-score{font-size:56px;font-weight:800;color:var(--orange);line-height:1;margin-bottom:4px}
.result-total{font-size:18px;color:var(--text-muted);margin-bottom:4px}
.result-mention{font-size:20px;font-weight:700;margin-bottom:1.5rem}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:1.5rem 0}
.result-stat{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px}
.result-stat-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.result-stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.result-user-recap{background:var(--orange-light);border:1px solid rgba(232,98,26,.2);border-radius:var(--radius);padding:12px 16px;margin:1rem 0;font-size:14px;color:var(--text-muted)}
.result-user-recap strong{color:var(--text);display:block;font-size:16px;margin-bottom:2px}
.result-actions{display:flex;gap:10px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
.save-status{font-size:13px;color:var(--text-muted);margin-top:.75rem;min-height:20px}
.save-status.ok{color:var(--success-text)}
.save-status.err{color:var(--danger-text)}

@media(max-width:480px){
  .container{padding:1rem .75rem 3rem}
  .question-card{padding:1.25rem 1rem}
  .form-row{grid-template-columns:1fr}
  .result-score{font-size:42px}
  .result-grid{gap:8px}
  .result-stat{padding:10px 6px}
  .result-stat-val{font-size:20px}
}

.center-msg{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2.5rem 2rem;text-align:center;color:var(--text-muted)}
.spinner{width:34px;height:34px;border:3px solid var(--border-strong);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
table tr:last-child{border-bottom:none!important}
textarea.form-input{font-family:inherit;line-height:1.5}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;border-bottom:1.5px solid var(--border);padding-bottom:0}
.tab{background:none;border:none;border-bottom:2.5px solid transparent;padding:9px 18px;font-size:14px;font-weight:600;font-family:inherit;color:var(--text-muted);cursor:pointer;transition:all .15s;margin-bottom:-1.5px}
.tab:hover{color:var(--orange)}
.tab.on{color:var(--orange);border-bottom-color:var(--orange)}
.addbar{display:flex;flex-wrap:wrap;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:1.25rem;position:sticky;top:74px;z-index:50}
.btn.addb{padding:6px 12px;font-size:12px;gap:5px}

.readbar{position:sticky;top:68px;z-index:99;height:3px;background:transparent}
.readbar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--orange),#F5963A);transition:width .1s linear}
.m-hero{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem 1.75rem;margin-bottom:1.25rem}
.m-tag{display:inline-block;background:var(--purple-light);color:var(--purple);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:4px 12px;border-radius:20px;margin-bottom:14px}
.m-hero h2{font-size:24px;font-weight:800;color:var(--purple);line-height:1.25;margin-bottom:14px;letter-spacing:-.3px}
.m-hero p{font-size:15px;color:var(--text-muted);margin-bottom:10px}
.m-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1.25rem}
.m-block h3{font-size:19px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:-.2px}
.m-block p{font-size:15px;color:var(--text-muted);margin-bottom:12px}
.m-block strong{color:var(--text);font-weight:600}
.m-quote{background:var(--orange-light);border-left:3px solid var(--orange);border-radius:0 var(--radius) var(--radius) 0;padding:16px 20px;font-size:16px;font-weight:600;color:var(--orange-dark);line-height:1.5;margin-top:18px}
.m-scene{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:14px}
.m-scene-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.m-scene-n{width:26px;height:26px;border-radius:50%;background:var(--purple);color:white;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.m-scene-h h4{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.m-scene p{font-size:14px;margin-bottom:10px}
.m-scene-r{border-left:2px solid var(--border-strong);padding-left:12px;margin-bottom:0!important}
.m-pause{background:var(--purple-light);border:1px solid rgba(74,63,159,.2);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
.m-pause-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--purple);margin-bottom:10px}
.m-pause-q{font-size:16px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:8px}
.m-pause-sub{font-size:13px;color:var(--purple);opacity:.85;margin-bottom:14px;line-height:1.5}
.m-input{width:100%;padding:12px 14px;border:1.5px solid rgba(74,63,159,.25);border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--text);background:white;outline:none;resize:vertical;line-height:1.5}
.m-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(74,63,159,.1)}
.m-pause-note{font-size:12px;color:var(--purple);opacity:.7;margin-top:8px}
.m-do{display:grid;grid-template-columns:1fr;gap:12px;margin-top:16px}
.m-do-col{border-radius:var(--radius);padding:16px 18px;border:1px solid}
.m-do-col.ok{background:var(--success-bg);border-color:var(--success-border)}
.m-do-col.ko{background:var(--danger-bg);border-color:var(--danger-border)}
.m-do-col h5{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.m-do-col.ok h5{color:var(--success-text)}
.m-do-col.ko h5{color:var(--danger-text)}
.m-do-col ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.m-do-col li{font-size:14px;line-height:1.45;padding-left:17px;position:relative;color:var(--text)}
.m-do-col.ok li::before{content:'\\2713';position:absolute;left:0;color:var(--success-border);font-weight:700}
.m-do-col.ko li::before{content:'\\00d7';position:absolute;left:0;color:var(--danger-border);font-weight:700}
.m-list{list-style:none;display:flex;flex-direction:column;gap:12px;margin-top:6px}
.m-list li{font-size:15px;line-height:1.55;color:var(--text-muted);padding-left:18px;position:relative}
.m-list li::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--purple)}
.m-list strong{color:var(--text)}
.m-key{background:var(--surface);border:2px solid var(--orange);border-radius:14px;padding:1.75rem;margin-bottom:1.25rem}
.m-key h3{font-size:17px;font-weight:700;color:var(--orange);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.m-key ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.m-key li{font-size:15px;line-height:1.5;padding-left:22px;position:relative;color:var(--text)}
.m-key li::before{content:'';position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--orange)}
.m-try{background:var(--purple);color:white;border-radius:14px;padding:1.75rem;margin-bottom:1.25rem}
.m-try-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;opacity:.75;margin-bottom:8px}
.m-try h3{font-size:19px;font-weight:700;margin-bottom:16px;letter-spacing:-.2px}
.m-try-list{list-style:none;counter-reset:t;display:flex;flex-direction:column;gap:14px}
.m-try-list li{font-size:15px;line-height:1.55;padding-left:34px;position:relative;opacity:.95}
.m-try-list li::before{counter-increment:t;content:counter(t);position:absolute;left:0;top:1px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.m-try-note{font-size:13px;opacity:.75;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2);line-height:1.5}
.m-end{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem 1.5rem;text-align:center;margin-bottom:1rem}
.m-end p{font-size:16px;font-weight:600;color:var(--purple);margin-bottom:1.25rem}
.m-end-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.m-foot{text-align:center;font-size:12px;color:var(--text-light);padding-bottom:2rem}
  .m-hero,.m-block,.m-key,.m-try{padding:1.35rem 1.15rem}
  .m-hero h2{font-size:20px}
  .m-block h3,.m-try h3{font-size:17px}
.m-fig{margin:1.25rem 0}
.m-fig img{width:100%;border-radius:12px;border:1px solid var(--border);display:block}
.m-fig figcaption{font-size:12px;color:var(--text-light);text-align:center;margin-top:6px;font-style:italic}


.container{max-width:720px}
.readbar{position:sticky;top:68px;z-index:99;height:3px;background:transparent}
.readbar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--orange),#F5963A);transition:width .1s linear}
.center-msg{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2.5rem 2rem;text-align:center;color:var(--text-muted)}
.spinner{width:34px;height:34px;border:3px solid var(--border-strong);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.m-fig{margin:1.25rem 0}
.m-fig img{width:100%;border-radius:12px;border:1px solid var(--border);display:block}
.m-fig figcaption{font-size:12px;color:var(--text-light);text-align:center;margin-top:6px;font-style:italic}
.m-end-actions a.btn{text-decoration:none}
@media(max-width:480px){.cat-intro{padding:1.5rem 1.25rem}.cat-intro h1{font-size:20px}}

</style>
</head>

/* ---------- RENDU DES BLOCS ---------- */
function blocHTML(b){
  const c=b.contenu||{};
  switch(b.type){
    case 'texte':return `<section class="m-block">
      ${c.titre?`<h3>${esc(c.titre)}</h3>`:''}
      ${(c.paragraphes||[]).filter(p=>p&&p.trim()).map(p=>`<p>${mdBold(p)}</p>`).join('')}</section>`;
    case 'scenes':return `<section class="m-block">
      ${c.titre?`<h3>${esc(c.titre)}</h3>`:''}
      ${(c.items||[]).map(s=>`<div class="m-scene">
        <div class="m-scene-h"><span class="m-scene-n">${esc(s.lettre)}</span><h4>${esc(s.titre)}</h4></div>
        ${s.texte?`<p>${mdBold(s.texte)}</p>`:''}
        ${s.analyse?`<p class="m-scene-r"><strong>Ce qui se passe :</strong> ${mdBold(s.analyse)}</p>`:''}
      </div>`).join('')}</section>`;
    case 'reflexion':return `<div class="m-pause">
      <div class="m-pause-label">Temps de r\u00e9flexion</div>
      <p class="m-pause-q">${esc(c.question)}</p>
      ${c.sous_titre?`<p class="m-pause-sub">${esc(c.sous_titre)}</p>`:''}
      <textarea class="m-input" rows="3" placeholder="${esc(c.placeholder||'')}"></textarea>
      <p class="m-pause-note">Vos notes restent sur votre appareil. Elles ne sont ni enregistr\u00e9es ni transmises.</p></div>`;
    case 'retenir':return `<div class="m-key">
      <h3>${esc(c.titre||'\u00c0 retenir')}</h3>
      <ul>${(c.points||[]).filter(p=>p&&p.trim()).map(p=>`<li>${mdBold(p)}</li>`).join('')}</ul></div>`;
    case 'citation':return `<div class="m-quote">${esc(c.texte||'').replace(/\n/g,'<br>')}</div>`;
    case 'comparaison':return `
      ${c.intro?`<section class="m-block"><p>${mdBold(c.intro)}</p></section>`:''}
      <div class="m-do">
        <div class="m-do-col ok"><h5>Plut\u00f4t</h5><ul>${(c.plutot||[]).filter(x=>x&&x.trim()).map(x=>`<li>${mdBold(x)}</li>`).join('')}</ul></div>
        <div class="m-do-col ko"><h5>\u00c0 \u00e9viter</h5><ul>${(c.eviter||[]).filter(x=>x&&x.trim()).map(x=>`<li>${mdBold(x)}</li>`).join('')}</ul></div>
      </div>`;
    case 'essayer':return `<div class="m-try">
      <div class="m-try-label">${esc(c.label||'\u00c0 essayer cette semaine')}</div>
      ${c.titre?`<h3>${esc(c.titre)}</h3>`:''}
      <ol class="m-try-list">${(c.etapes||[]).map(e=>`<li>${e.titre?`<strong>${esc(e.titre)}</strong> `:''}${mdBold(e.texte||'')}</li>`).join('')}</ol>
      ${c.note?`<p class="m-try-note">${mdBold(c.note)}</p>`:''}</div>`;
    case 'image':return c.url?`<figure class="m-fig">
      <img src="${esc(c.url)}" alt="${esc(c.alt||'')}" loading="lazy">
      ${c.legende?`<figcaption>${esc(c.legende)}</figcaption>`:''}</figure>`:'';
  }
  return '';
}

/* ---------- VUE : MODULE ---------- */
async function showModule(id){
  const{data:m,error}=await db.from('module').select('*').eq('id',id).single();
  if(error||!m)return erreur("Ce lien n'est pas valide ou le module n'est plus disponible.");
  if(!m.publie)return erreur("Ce module n'est pas encore publi\u00e9.");

  const{data:t}=await db.from('theme').select('*').eq('id',m.theme_id).single();
  const{data:blocs,error:e2}=await db.from('bloc').select('*').eq('module_id',id).order('ordre');
  if(e2)return erreur(e2.message);

  const nom=t?t.nom:'';
  setHead(m.titre,'Micro-formation'+(nom?' \u00b7 '+nom:''),'\u2248 '+estimeTemps(blocs||[])+' min');
  document.title=m.titre+' \u2014 Koalakids';

  app().innerHTML=`<div class="container">
    <div class="m-hero">
      ${nom?`<div class="m-tag">Th\u00e8me : ${esc(nom)}</div>`:''}
      <h2>${esc(m.titre)}</h2>
      ${m.accroche?`<p>${mdBold(m.accroche)}</p>`:''}
    </div>
    ${(blocs||[]).map(blocHTML).join('\n')}
    <div class="m-end">
      <h3>Vous avez termin\u00e9 ce module</h3>
      <p>Prenez le temps d'essayer ce qui vous a parl\u00e9. Vous pouvez y revenir quand vous voulez.</p>
      <div class="m-end-actions">
        <button class="btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">Relire depuis le d\u00e9but</button>
      </div>
    </div>
    <p class="m-foot">Micro-formation Koalakids${nom?' \u00b7 '+esc(nom):''}</p></div>`;
  window.scrollTo(0,0);
}

function estimeTemps(blocs){
  let mots=0;
  const compte=v=>{
    if(typeof v==='string')mots+=v.split(/\s+/).filter(Boolean).length;
    else if(Array.isArray(v))v.forEach(compte);
    else if(v&&typeof v==='object')Object.values(v).forEach(compte);
  };
  blocs.forEach(b=>compte(b.contenu));
  return Math.max(2,Math.round(mots/180));
}

/* ---------- BARRE DE LECTURE ---------- */
addEventListener('scroll',()=>{
  const h=document.documentElement;
  const d=h.scrollHeight-h.clientHeight;
  document.getElementById('readbar').style.width=(d>0?Math.min(100,h.scrollTop/d*100):0)+'%';
});

/* ---------- ROUTAGE ---------- */
function route(){
  const id=new URLSearchParams(location.search).get('module');
  if(id)showModule(id);else showAccueil();
}
addEventListener('popstate',route);
route();

</script>
