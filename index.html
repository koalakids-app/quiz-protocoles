<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koala Kids — Accueil</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Instrument Sans', sans-serif;
  background: #F0EDE8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.container {
  width: 100%;
  max-width: 480px;
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 800;
  color: #1C1917;
  letter-spacing: -0.5px;
}

.logo h1 span { color: #F47920; }

.logo p {
  font-size: 14px;
  color: #A8A29E;
  margin-top: 6px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 24px 28px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 20px;
  border: 1px solid #E7E5E0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  transition: transform .15s, box-shadow .15s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,.10);
}

.card-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}

.card-stock .card-icon { background: #EFF6FF; }
.card-dem .card-icon   { background: #FEF0E6; }
.card-quiz .card-icon  { background: #EEEDFE; }
.card-form .card-icon  { background: #EAF6EE; }

.card-text h2 {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: #1C1917;
  margin-bottom: 4px;
}

.card-text p {
  font-size: 13px;
  color: #A8A29E;
  line-height: 1.4;
}

.card-arrow {
  margin-left: auto;
  font-size: 20px;
  color: #D6D3CF;
  flex-shrink: 0;
}

.card-stock:hover .card-arrow { color: #2563EB; }
.card-dem:hover   .card-arrow { color: #F47920; }
.card-quiz:hover  .card-arrow { color: #4A3F9F; }
.card-form:hover  .card-arrow { color: #2EBD6A; }

.footer {
  text-align: center;
  margin-top: 28px;
  font-size: 11.5px;
  color: #C8C4BE;
}

@media (max-width: 400px) {
  .card { padding: 18px 20px; gap: 14px; }
  .card-icon { width: 48px; height: 48px; font-size: 22px; }
  .card-text h2 { font-size: 15px; }
}
</style>
</head>
<body>

<div class="container">

  <div class="logo">
    <h1>koala<span>kids</span></h1>
    <p>Réseau Micro-Crèches</p>
  </div>

  <div class="cards">

    <a href="stock.html" class="card card-stock">
      <div class="card-icon">📦</div>
      <div class="card-text">
        <h2>Stock pédagogique</h2>
        <p>Inventaire, commandes, fournisseurs, univers ludiques</p>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a href="demandes.html" class="card card-dem">
      <div class="card-icon">💬</div>
      <div class="card-text">
        <h2>Demandes RT</h2>
        <p>Demandes, incidents, présences, planning, référents</p>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a href="https://koalakids-app.github.io/quiz-protocoles/admin.html" class="card card-quiz">
      <div class="card-icon">🎓</div>
      <div class="card-text">
        <h2>Quiz &amp; Formations</h2>
        <p>Administration : quiz, micro-formations, résultats</p>
      </div>
      <div class="card-arrow">›</div>
    </a>

  </div>

  <div class="footer">Koala Kids © 2026</div>

</div>

</body>
</html>
