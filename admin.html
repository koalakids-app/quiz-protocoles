<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — Quiz Koalakids</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8621A;
  --orange-light:#FDF0E8;
  --orange-dark:#C45112;
  --purple:#4A3F9F;
  --purple-light:#EEEDFE;
  --bg:#FBF7F4;
  --surface:#FFFFFF;
  --surface-2:#FEF9F6;
  --border:rgba(232,98,26,0.15);
  --border-strong:rgba(232,98,26,0.3);
  --text:#2D1F0E;
  --text-muted:#7A5C3F;
  --text-light:#B8956A;
  --radius:10px;
  --success-bg:#EAF6EE;
  --success-border:#2EBD6A;
  --success-text:#0F6E35;
  --danger-bg:#FDF0EE;
  --danger-border:#E07060;
  --danger-text:#993C1D;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* HEADER */
.app-header{background:var(--purple);color:white;padding:.9rem 1.5rem;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(74,63,159,.25)}
.header-logo{height:44px;border-radius:6px;background:white;padding:3px 6px}
.header-title{flex:1}
.header-title h1{font-size:16px;font-weight:700;letter-spacing:-.2px}
.header-title p{font-size:11px;opacity:.75;margin-top:1px}
.header-score-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;white-space:nowrap}

/* CONTAINER */
.container{max-width:660px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* PROGRESS */
.progress-wrap{background:var(--surface);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;border:1px solid var(--border)}
.progress-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-label{font-size:13px;color:var(--text-muted)}
.progress-count{font-size:13px;font-weight:700;color:var(--orange)}
.progress-bar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),#F5963A);border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* QUESTION */
.question-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem}
.q-badge{display:inline-flex;align-items:center;gap:6px;background:var(--orange-light);color:var(--orange);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:20px;margin-bottom:12px;border:1px solid rgba(232,98,26,.2)}
.q-text{font-size:16px;font-weight:500;color:var(--text);line-height:1.55;margin-bottom:1.25rem}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s,background .15s,transform .1s;user-select:none}
.option:hover:not(.disabled){border-color:var(--orange);background:var(--orange-light);transform:translateX(3px)}
.option.selected{border-color:var(--orange);background:var(--orange-light)}
.option.correct{border-color:var(--success-border);background:var(--success-bg)}
.option.wrong{border-color:var(--danger-border);background:var(--danger-bg)}
.option.disabled{cursor:default;transform:none}
.option-letter{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-muted);flex-shrink:0;transition:all .15s;background:white}
.option.selected .option-letter{background:var(--orange);border-color:var(--orange);color:white}
.option.correct .option-letter{background:var(--success-border);border-color:var(--success-border);color:white}
.option.wrong .option-letter{background:var(--danger-border);border-color:var(--danger-border);color:white}
.option-text{font-size:14px;color:var(--text);line-height:1.4}

/* FEEDBACK */
.feedback{margin-top:12px;padding:10px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;display:none;align-items:flex-start;gap:8px}
.feedback.show{display:flex}
.feedback.ok{background:var(--success-bg);color:var(--success-text);border:1px solid var(--success-border)}
.feedback.ko{background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-border)}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:1.5px solid var(--border-strong);border-radius:var(--radius);background:white;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange);background:var(--orange-light)}
.btn:disabled{opacity:.35;cursor:default}
.btn.primary{background:var(--orange);color:white;border-color:var(--orange)}
.btn.primary:hover:not(:disabled){background:#D45715;border-color:#D45715;color:white}
.btn.purple{background:var(--purple);color:white;border-color:var(--purple)}
.btn.purple:hover:not(:disabled){background:#3D348E;border-color:#3D348E;color:white}
.pager{font-size:13px;color:var(--text-muted);font-weight:500}

/* START SCREEN */
.start-screen{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2.5rem 2rem;text-align:center}
.start-logo-wrap{margin:0 auto 1.5rem;display:flex;justify-content:center}
.start-logo-wrap img{height:80px}
.start-screen h2{font-size:22px;font-weight:700;color:var(--purple);margin-bottom:8px}
.start-screen .subtitle{font-size:15px;color:var(--text-muted);margin-bottom:2rem;line-height:1.6}
.start-meta{display:flex;justify-content:center;gap:20px;margin-bottom:2rem;flex-wrap:wrap}
.start-meta-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);background:var(--orange-light);padding:5px 14px;border-radius:20px;border:1px solid rgba(232,98,26,.2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0}

/* FORM */
.form-group{text-align:left;margin-bottom:1rem}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-input,.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border-strong);border-radius:var(--radius);font-size:15px;font-family:inherit;color:var(--text);background:white;transition:border-color .15s;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,98,26,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* RESULTS */
.results{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2rem 1.5rem;text-align:center}
.result-icon{font-size:52px;margin-bottom:8px}
.result-score{font-size:56px;font-weight:800;color:var(--orange);line-height:1;margin-bottom:4px}
.result-total{font-size:18px;color:var(--text-muted);margin-bottom:4px}
.result-mention{font-size:20px;font-weight:700;margin-bottom:1.5rem}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:1.5rem 0}
.result-stat{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px}
.result-stat-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.result-stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.result-user-recap{background:var(--orange-light);border:1px solid rgba(232,98,26,.2);border-radius:var(--radius);padding:12px 16px;margin:1rem 0;font-size:14px;color:var(--text-muted)}
.result-user-recap strong{color:var(--text);display:block;font-size:16px;margin-bottom:2px}
.result-actions{display:flex;gap:10px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
.save-status{font-size:13px;color:var(--text-muted);margin-top:.75rem;min-height:20px}
.save-status.ok{color:var(--success-text)}
.save-status.err{color:var(--danger-text)}

@media(max-width:480px){
  .container{padding:1rem .75rem 3rem}
  .question-card{padding:1.25rem 1rem}
  .form-row{grid-template-columns:1fr}
  .result-score{font-size:42px}
  .result-grid{gap:8px}
  .result-stat{padding:10px 6px}
  .result-stat-val{font-size:20px}
}

.center-msg{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:2.5rem 2rem;text-align:center;color:var(--text-muted)}
.spinner{width:34px;height:34px;border:3px solid var(--border-strong);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
table tr:last-child{border-bottom:none!important}
textarea.form-input{font-family:inherit;line-height:1.5}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;border-bottom:1.5px solid var(--border);padding-bottom:0}
.tab{background:none;border:none;border-bottom:2.5px solid transparent;padding:9px 18px;font-size:14px;font-weight:600;font-family:inherit;color:var(--text-muted);cursor:pointer;transition:all .15s;margin-bottom:-1.5px}
.tab:hover{color:var(--orange)}
.tab.on{color:var(--orange);border-bottom-color:var(--orange)}
.addbar{display:flex;flex-wrap:wrap;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:1.25rem;position:sticky;top:74px;z-index:50}
.btn.addb{padding:6px 12px;font-size:12px;gap:5px}
</style>
</head>

function tabs(active){

function renderLogin(){
  app().innerHTML=`
  <div class="start-screen" style="max-width:420px;margin:2rem auto">
    <div class="start-logo-wrap"><img src="${document.getElementById('logo').src}" alt="Koalakids"></div>

    <div id="log-err" class="save-status err" style="margin-top:.75rem"></div>

}
async function login(){
  const email=document.getElementById('log-mail').value.trim();
  const password=document.getElementById('log-pass').value;
  const err=document.getElementById('log-err');
  err.textContent='Connexion…';

  if(error){err.textContent='⚠ '+error.message;return;}

}
async function logout(){await db.auth.signOut();view='login';render();}

async function loadQuizzes(){
  const{data,error}=await db.from('quiz').select('*').order('cree_le',{ascending:false});
  if(error){app().innerHTML=`<div class="center-msg">⚠ ${esc(error.message)}</div>`;return;}
  quizzes=data||[];
  const counts={};
  for(const q of quizzes){
    const{count}=await db.from('questions').select('*',{count:'exact',head:true}).eq('quiz_id',q.id);
    const{count:rc}=await db.from('resultats').select('*',{count:'exact',head:true}).eq('quiz_id',q.id);
    counts[q.id]={q:count||0,r:rc||0};
  }
  quizzes.forEach(q=>{q._c=counts[q.id]});
  render();
}

function renderList(){
  const base=quizBase();
  const items=quizzes.length?quizzes.map(q=>`
    <div class="question-card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <h3 style="font-size:16px;font-weight:700">${esc(q.titre)}</h3>
          <p style="font-size:13px;color:var(--text-muted);margin-top:2px">${esc(q.description)}</p>
          <p style="font-size:12px;color:var(--text-light);margin-top:6px">
            ${q._c.q} question${q._c.q>1?'s':''} · ${q._c.r} résultat${q._c.r>1?'s':''} ·
            <span style="color:${q.publie?'var(--success-text)':'var(--text-light)'}">${q.publie?'● Publié':'○ Brouillon'}</span>
          </p>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="btn" style="padding:7px 14px;font-size:13px" onclick="openQuiz('${q.id}')">Modifier</button>
        <button class="btn" style="padding:7px 14px;font-size:13px" onclick="openResults('${q.id}')">Résultats (${q._c.r})</button>
        <button class="btn" style="padding:7px 14px;font-size:13px" onclick="togglePublish('${q.id}',${q.publie})">${q.publie?'Dépublier':'Publier'}</button>
        <button class="btn" style="padding:7px 14px;font-size:13px" onclick="copyLink('${q.id}')">Copier le lien</button>
        <button class="btn" style="padding:7px 14px;font-size:13px;color:var(--danger-text)" onclick="deleteQuiz('${q.id}')">Supprimer</button>
      </div>
    </div>`).join(''):`<div class="center-msg">Aucun quiz. Créez le premier.</div>`;
  app().innerHTML=`
    ${tabs('quiz')}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap">
      <h2 style="font-size:20px;color:var(--purple)">Mes quiz</h2>
      <button class="btn purple" onclick="newQuiz()">+ Nouveau quiz</button>
    </div>${items}
    <p style="font-size:12px;color:var(--text-light);margin-top:1rem">Lien salariées : ${esc(base)}?quiz=IDENTIFIANT</p>`;
}

function quizBase(){
  let u=location.href.split('?')[0].split('#')[0];
  u=u.replace(/\/admin(\.html)?\/?$/i,'/index.html');
  if(!/index\.html$/i.test(u))u=u.replace(/\/?$/,'/index.html');
  return u;
}
function copyLink(id){
  const base=quizBase();
  const url=base+'?quiz='+id;
  navigator.clipboard.writeText(url).then(()=>alert('Lien copié :\n'+url),()=>prompt('Copiez ce lien :',url));
}
async function togglePublish(id,cur){
  const{error}=await db.from('quiz').update({publie:!cur}).eq('id',id);
  if(error)return alert('Erreur : '+error.message);
  await loadQuizzes();
}
async function deleteQuiz(id){
  const q=quizzes.find(x=>x.id===id);
  if(!confirm(`Supprimer « ${q.titre} » ?\nLes questions ET les résultats associés seront définitivement effacés.`))return;
  const{error}=await db.from('quiz').delete().eq('id',id);
  if(error)return alert('Erreur : '+error.message);
  await loadQuizzes();
}
async function newQuiz(){
  const titre=prompt('Titre du nouveau quiz :');
  if(!titre)return;
  const{data,error}=await db.from('quiz').insert({titre:titre,description:'',publie:false}).select().single();
  if(error)return alert('Erreur : '+error.message);
  openQuiz(data.id);
}

async function openQuiz(id){
  curQuiz=quizzes.find(q=>q.id===id)||null;
  if(!curQuiz){const{data}=await db.from('quiz').select('*').eq('id',id).single();curQuiz=data;}
  const{data,error}=await db.from('questions').select('*').eq('quiz_id',id).order('ordre');
  if(error)return alert('Erreur : '+error.message);
  curQuestions=data||[];
  view='edit';render();
}

function renderEdit(){
  const qs=curQuestions.map((q,i)=>{
    const opts=q.options.map((o,j)=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <input type="${q.multi?'checkbox':'radio'}" name="ans-${i}" ${q.reponses.includes(j)?'checked':''}
          onchange="setAnswer(${i},${j},this.checked)" style="width:16px;height:16px;accent-color:var(--orange);flex-shrink:0">
        <span style="font-size:12px;font-weight:700;color:var(--text-muted);width:14px">${letters[j]}</span>
        <input class="form-input" style="padding:6px 10px;font-size:13px" value="${esc(o)}"
          onchange="setOption(${i},${j},this.value)">
        ${q.options.length>2?`<button class="btn" style="padding:4px 8px;font-size:12px" onclick="delOption(${i},${j})">×</button>`:''}
      </div>`).join('');
    return `<div class="question-card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap">
        <span class="q-badge" style="margin:0">Question ${i+1}</span>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px">
            <input type="checkbox" ${q.multi?'checked':''} onchange="setMulti(${i},this.checked)"
              style="accent-color:var(--purple)"> Plusieurs réponses</label>
          <button class="btn" style="padding:4px 9px;font-size:12px" onclick="moveQ(${i},-1)" ${i===0?'disabled':''}>↑</button>
          <button class="btn" style="padding:4px 9px;font-size:12px" onclick="moveQ(${i},1)" ${i===curQuestions.length-1?'disabled':''}>↓</button>
          <button class="btn" style="padding:4px 9px;font-size:12px;color:var(--danger-text)" onclick="delQ(${i})">Suppr.</button>
        </div>
      </div>
      <textarea class="form-input" rows="2" style="font-size:14px;margin-bottom:10px;resize:vertical"
        onchange="setEnonce(${i},this.value)">${esc(q.enonce)}</textarea>
      ${opts}
      ${q.options.length<6?`<button class="btn" style="padding:5px 12px;font-size:12px;margin-top:4px" onclick="addOption(${i})">+ Option</button>`:''}
    </div>`;
  }).join('');
  app().innerHTML=`
    <button class="btn" style="margin-bottom:1rem" onclick="backToList()">← Retour</button>
    <div class="question-card" style="margin-bottom:1.25rem">
      <div class="form-group"><label class="form-label">Titre du quiz</label>
        <input class="form-input" id="qz-titre" value="${esc(curQuiz.titre)}"></div>
      <div class="form-group" style="margin-bottom:0"><label class="form-label">Description</label>
        <input class="form-input" id="qz-desc" value="${esc(curQuiz.description)}"></div>
    </div>
    ${qs||'<div class="center-msg">Aucune question. Ajoutez la première.</div>'}
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem">
      <button class="btn" onclick="addQ()">+ Ajouter une question</button>
      <button class="btn primary" onclick="saveAll()">Enregistrer les modifications</button>
    </div>
    <div id="save-msg" class="save-status" style="margin-top:.75rem"></div>`;
}

function setEnonce(i,v){curQuestions[i].enonce=v}
function setOption(i,j,v){curQuestions[i].options[j]=v}
function setMulti(i,v){
  const q=curQuestions[i];q.multi=v;
  if(!v&&q.reponses.length>1)q.reponses=[q.reponses[0]];
  renderEdit();
}
function setAnswer(i,j,checked){
  const q=curQuestions[i];
  if(q.multi){
    q.reponses=checked?[...new Set([...q.reponses,j])].sort((a,b)=>a-b):q.reponses.filter(x=>x!==j);
  }else q.reponses=[j];
}
function addOption(i){curQuestions[i].options.push('');renderEdit()}
function delOption(i,j){
  const q=curQuestions[i];
  q.options.splice(j,1);
  q.reponses=q.reponses.filter(x=>x!==j).map(x=>x>j?x-1:x);
  if(!q.reponses.length)q.reponses=[0];
  renderEdit();
}
function addQ(){
  curQuestions.push({quiz_id:curQuiz.id,enonce:'Nouvelle question',options:['','','',''],reponses:[0],multi:false,ordre:curQuestions.length,_new:true});
  renderEdit();
}
function delQ(i){
  if(!confirm('Supprimer cette question ?'))return;
  const q=curQuestions[i];
  if(q.id)(curQuestions._del=curQuestions._del||[]).push(q.id);
  curQuestions.splice(i,1);renderEdit();
}
function moveQ(i,d){
  const j=i+d;if(j<0||j>=curQuestions.length)return;
  const del=curQuestions._del;
  [curQuestions[i],curQuestions[j]]=[curQuestions[j],curQuestions[i]];
  curQuestions._del=del;renderEdit();
}
function backToList(){
  if(confirm('Quitter sans enregistrer les modifications non sauvegardées ?')){view='list';loadQuizzes();}
}

async function saveAll(){
  const msg=document.getElementById('save-msg');
  msg.className='save-status';msg.textContent='Enregistrement…';
  try{
    const u=await db.from('quiz').update({
      titre:document.getElementById('qz-titre').value.trim(),
      description:document.getElementById('qz-desc').value.trim()
    }).eq('id',curQuiz.id);
    if(u.error)throw u.error;
    if(curQuestions._del&&curQuestions._del.length){
      const d=await db.from('questions').delete().in('id',curQuestions._del);
      if(d.error)throw d.error;
      curQuestions._del=[];
    }
    for(let i=0;i<curQuestions.length;i++){
      const q=curQuestions[i];
      const payload={quiz_id:curQuiz.id,enonce:q.enonce,options:q.options,reponses:q.reponses,multi:q.multi,ordre:i};
      if(q.id){
        const r=await db.from('questions').update(payload).eq('id',q.id);
        if(r.error)throw r.error;
      }else{
        const r=await db.from('questions').insert(payload).select().single();
        if(r.error)throw r.error;
        q.id=r.data.id;delete q._new;
      }
      q.ordre=i;
    }
    msg.className='save-status ok';msg.textContent='✓ Modifications enregistrées';
  }catch(e){
    msg.className='save-status err';msg.textContent='⚠ '+e.message;
  }
}

async function openResults(id){
  curQuiz=quizzes.find(q=>q.id===id);
  const{data,error}=await db.from('resultats').select('*').eq('quiz_id',id).order('passe_le',{ascending:false});
  if(error)return alert('Erreur : '+error.message);
  results=data||[];filterCreche='';view='results';render();
}

function renderResults(){
  const list=filterCreche?results.filter(r=>r.creche===filterCreche):results;
  const creches=[...new Set(results.map(r=>r.creche))].sort();
  const moy=list.length?Math.round(list.reduce((a,r)=>a+r.pourcentage,0)/list.length):0;

  let byQ='';
  if(list.length&&list[0].detail){
    const stats={};
    list.forEach(r=>(r.detail||[]).forEach(d=>{
      if(!stats[d.ordre])stats[d.ordre]={e:d.enonce,ok:0,n:0};
      stats[d.ordre].n++;if(d.correct)stats[d.ordre].ok++;
    }));
    const rows=Object.entries(stats).sort((a,b)=>a[0]-b[0]).map(([o,s])=>{
      const p=Math.round(s.ok/s.n*100);
      const col=p>=70?'var(--success-text)':p>=40?'var(--orange)':'var(--danger-text)';
      return `<tr><td style="padding:6px 8px;font-size:12px;color:var(--text-muted)">Q${+o+1}</td>
        <td style="padding:6px 8px;font-size:12px">${esc(s.e).slice(0,90)}</td>
        <td style="padding:6px 8px;font-size:13px;font-weight:700;color:${col};text-align:right;white-space:nowrap">${p}%</td></tr>`;
    }).join('');
    byQ=`<h3 style="font-size:15px;color:var(--purple);margin:1.5rem 0 .5rem">Taux de réussite par question</h3>
      <div class="question-card" style="padding:8px;overflow-x:auto"><table style="width:100%;border-collapse:collapse">${rows}</table></div>`;
  }

  const rows=list.map(r=>`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px;font-size:13px"><strong>${esc(r.prenom)} ${esc(r.nom)}</strong></td>
      <td style="padding:8px;font-size:12px;color:var(--text-muted)">${esc(r.creche)}</td>
      <td style="padding:8px;font-size:12px;color:var(--text-muted);white-space:nowrap">${new Date(r.passe_le).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
      <td style="padding:8px;font-size:13px;text-align:right;white-space:nowrap">${r.score}/${r.total}</td>
      <td style="padding:8px;font-size:13px;font-weight:700;text-align:right;color:${r.pourcentage>=80?'var(--success-text)':r.pourcentage>=60?'var(--purple)':'var(--danger-text)'}">${r.pourcentage}%</td>
      <td style="padding:8px;text-align:right"><button class="btn" style="padding:3px 8px;font-size:11px" onclick="showDetail('${r.id}')">Détail</button></td>
    </tr>`).join('');

  app().innerHTML=`
    <button class="btn" style="margin-bottom:1rem" onclick="view='list';loadQuizzes()">← Retour</button>
    <h2 style="font-size:19px;color:var(--purple);margin-bottom:.25rem">${esc(curQuiz.titre)}</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:1rem">${list.length} résultat${list.length>1?'s':''} · moyenne ${moy}%</p>
    <div class="form-group" style="max-width:320px">
      <label class="form-label">Filtrer par crèche</label>
      <select class="form-select" onchange="filterCreche=this.value;renderResults()">
        <option value="">Toutes les crèches</option>
        ${creches.map(c=>`<option value="${esc(c)}" ${c===filterCreche?'selected':''}>${esc(c)}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:1rem"><button class="btn" onclick="exportCSV()">Exporter en CSV</button></div>
    ${list.length?`<div class="question-card" style="padding:8px;overflow-x:auto"><table style="width:100%;border-collapse:collapse">${rows}</table></div>`:'<div class="center-msg">Aucun résultat pour ce filtre.</div>'}
    ${byQ}`;
}

function showDetail(id){
  const r=results.find(x=>x.id===id);
  if(!r||!r.detail)return alert('Aucun détail enregistré pour ce résultat.');
  const ko=r.detail.filter(d=>!d.correct);
  const txt=ko.length?ko.map(d=>`Q${d.ordre+1} — ${d.enonce}`).join('\n\n'):'Aucune erreur.';
  alert(`${r.prenom} ${r.nom} — ${r.score}/${r.total}\n\nQuestions ratées :\n\n${txt}`);
}

function exportCSV(){
  const list=filterCreche?results.filter(r=>r.creche===filterCreche):results;
  const head=['Prénom','Nom','Crèche','Date','Score','Total','Pourcentage','Questions ratées'];
  const lines=[head.join(';')];
  list.forEach(r=>{
    const ko=(r.detail||[]).filter(d=>!d.correct).map(d=>'Q'+(d.ordre+1)).join(' ');
    lines.push([r.prenom,r.nom,r.creche,new Date(r.passe_le).toLocaleString('fr-FR'),r.score,r.total,r.pourcentage+'%',ko]
      .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';'));
  });
  const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='resultats-'+curQuiz.titre.replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.csv';
  a.click();
}

        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="btn primary" style="padding:7px 14px;font-size:13px" onclick="openTheme('${t.id}')">Ouvrir (${t._n})</button>

      </div>
    </div>`).join(''):`<div class="center-msg">Aucun thème pour l'instant. Créez le premier.</div>`;
  app().innerHTML=`

async function newTheme(){
  const nom=prompt('Nom du thème (ex : L\'attachement) :');
  if(!nom||!nom.trim())return;
  const description=prompt('Description courte (facultative) :')||'';
  const ordre=themes.length;
  const{error}=await db.from('theme').insert({nom:nom.trim(),description:description.trim(),ordre});
  if(error)return alert('Erreur : '+error.message);
  loadThemes();
}
async function editTheme(id){
  const t=themes.find(x=>x.id===id);
  const nom=prompt('Nom du thème :',t.nom);
  if(nom===null||!nom.trim())return;
  const description=prompt('Description :',t.description||'');
  if(description===null)return;
  const{error}=await db.from('theme').update({nom:nom.trim(),description:description.trim()}).eq('id',id);
  if(error)return alert('Erreur : '+error.message);
  loadThemes();
}
async function deleteTheme(id){
  const t=themes.find(x=>x.id===id);
  if(t._n>0){
    if(!confirm(`« ${t.nom} » contient ${t._n} module${t._n>1?'s':''}.\nLes supprimer également, avec tout leur contenu ?\n\nCette action est définitive.`))return;
  }else if(!confirm(`Supprimer le thème « ${t.nom} » ?`))return;
  const{error}=await db.from('theme').delete().eq('id',id);
  if(error)return alert('Erreur : '+error.message);
  loadThemes();
}
async function moveTheme(i,d){
  const j=i+d;if(j<0||j>=themes.length)return;
  const a=themes[i],b=themes[j];
  const e1=await db.from('theme').update({ordre:j}).eq('id',a.id);
  const e2=await db.from('theme').update({ordre:i}).eq('id',b.id);
  if(e1.error||e2.error)return alert('Erreur : '+((e1.error||e2.error).message));
  loadThemes();
}

/* ----- MODULES D'UN THÈME ----- */

async function openTheme(id){
  curTheme=themes.find(t=>t.id===id)||null;
  if(!curTheme){const{data}=await db.from('theme').select('*').eq('id',id).single();curTheme=data;}
  await loadModules();
}
async function loadModules(){
  const{data,error}=await db.from('module').select('*').eq('theme_id',curTheme.id).order('ordre');
  if(error)return alert('Erreur : '+error.message);
  curModules=data||[];
  for(const m of curModules){
    const{count}=await db.from('bloc').select('*',{count:'exact',head:true}).eq('module_id',m.id);
    m._b=count||0;
  }
  view='modules';render();
}

function renderModules(){
  const items=curModules.length?curModules.map((m,i)=>`
    <div class="question-card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <h3 style="font-size:16px;font-weight:700">${esc(m.titre)}</h3>
          <p style="font-size:13px;color:var(--text-muted);margin-top:2px">${esc(m.accroche)||'<em style="color:var(--text-light)">Aucune accroche</em>'}</p>
          <p style="font-size:12px;color:var(--text-light);margin-top:6px">
            ${m._b} bloc${m._b>1?'s':''} ·
            <span style="color:${m.publie?'var(--success-text)':'var(--text-light)'}">${m.publie?'● Publié':'○ Brouillon'}</span>
          </p>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn" style="padding:4px 9px;font-size:12px" onclick="moveModule(${i},-1)" ${i===0?'disabled':''}>↑</button>
          <button class="btn" style="padding:4px 9px;font-size:12px" onclick="moveModule(${i},1)" ${i===curModules.length-1?'disabled':''}>↓</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="btn primary" style="padding:7px 14px;font-size:13px" onclick="editContent('${m.id}')">Modifier le contenu</button>
        <button class="btn" style="padding:7px 14px;font-size:13px" onclick="editModule('${m.id}')">Renommer</button>
        <button class="btn" style="padding:7px 14px;font-size:13px" onclick="toggleModule('${m.id}',${m.publie})">${m.publie?'Dépublier':'Publier'}</button>
        <button class="btn" style="padding:7px 14px;font-size:13px;color:var(--danger-text)" onclick="deleteModule('${m.id}')">Supprimer</button>
      </div>
    </div>`).join(''):`<div class="center-msg">Aucun module dans ce thème. Créez le premier.</div>`;
  app().innerHTML=`
    ${tabs('formations')}
    <button class="btn" style="margin-bottom:1rem" onclick="loadThemes()">← Tous les thèmes</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;gap:12px;flex-wrap:wrap">
      <h2 style="font-size:20px;color:var(--purple)">${esc(curTheme.nom)}</h2>
      <button class="btn purple" onclick="newModule()">+ Nouveau module</button>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:1.25rem">${esc(curTheme.description)}</p>
    ${items}`;
}

function blocVide(type){
  const c={

    reflexion:{question:'',sous_titre:'',placeholder:'Écrivez ce qui vous vient. Personne ne lira cette réponse.'},

    comparaison:{intro:'',plutot:[''],eviter:['']},
    essayer:{label:'À essayer cette semaine',titre:'',etapes:[{titre:'',texte:''}],note:''},

async function editContent(id){
  curModule=curModules.find(x=>x.id===id);
  const{data,error}=await db.from('bloc').select('*').eq('module_id',id).order('ordre');
  if(error)return alert('Erreur : '+error.message);

}

/* ---------- RENDU DES ÉDITEURS PAR TYPE ---------- */

function ta(val,oninput,rows,ph){
  return `<textarea class="form-input" rows="${rows||2}" placeholder="${ph||''}"
    style="font-size:13px;padding:7px 10px;resize:vertical" oninput="${oninput}">${esc(val)}</textarea>`;
}
function inp(val,oninput,ph){
  return `<input class="form-input" style="font-size:13px;padding:7px 10px" placeholder="${ph||''}"
    value="${esc(val)}" oninput="${oninput}">`;
}
function lbl(t){return `<div style="font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.4px;margin:10px 0 4px">${t}</div>`}
function miniBtn(txt,onclick,danger){
  return `<button class="btn" style="padding:3px 9px;font-size:11px${danger?';color:var(--danger-text)':''}" onclick="${onclick}">${txt}</button>`;
}

          <div style="flex:1">
            ${inp(e.titre,`setObjArr(${i},'etapes',${j},'titre',this.value)`,'Observer.')}
            <div style="margin-top:4px">${ta(e.texte,`setObjArr(${i},'etapes',${j},'texte',this.value)`,2,"Ce qu'il faut faire concrètement")}</div>
          </div>
          ${c.etapes.length>1?miniBtn('×',`delArr(${i},'etapes',${j})`,1):''}
        </div>`).join('')}
      ${miniBtn('+ Étape',`addArr(${i},'etapes',{titre:'',texte:''})`)}
      ${lbl('Note de fin (facultative)')}
      ${ta(c.note,S('note'),2)}`;

    case 'image':return `
      ${c.url?`<div style="margin:8px 0"><img src="${esc(c.url)}" alt="" style="max-width:100%;max-height:220px;border-radius:8px;border:1px solid var(--border)"></div>`:''}
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0">
        <input type="file" accept="image/*" id="file-${i}" style="display:none" onchange="uploadImg(${i},this)">
        <button class="btn" style="padding:6px 14px;font-size:12px" onclick="document.getElementById('file-${i}').click()">
          ${c.url?'Remplacer l\'image':'Choisir une image'}</button>
        <span id="up-${i}" style="font-size:12px;color:var(--text-muted)"></span>
      </div>
      ${lbl('Ou coller une adresse d\'image')}
      ${inp(c.url,S('url'),'https://…')}
      ${lbl('Texte alternatif (décrit l\'image, pour l\'accessibilité)')}
      ${inp(c.alt,S('alt'),'Une professionnelle accueille un enfant')}
      ${lbl('Légende affichée sous l\'image (facultative)')}
      ${inp(c.legende,S('legende'))}`;
  }
  return '<em>Type inconnu</em>';
}

/* ---------- MUTATIONS ---------- */
function setC(i,path,v){curBlocs[i].contenu[path]=v;dirty()}
function setArr(i,key,j,v){curBlocs[i].contenu[key][j]=v;dirty()}
function setObjArr(i,key,j,f,v){curBlocs[i].contenu[key][j][f]=v;dirty()}
function addArr(i,key,val){curBlocs[i].contenu[key].push(typeof val==='object'?{...val}:val);dirty();renderBlocs()}
function delArr(i,key,j){curBlocs[i].contenu[key].splice(j,1);dirty();renderBlocs()}

function dirty(){
  const m=document.getElementById('bl-msg');
  if(m){m.className='save-status';m.textContent='Modifications non enregistrées';}
}

function addBloc(type){
  curBlocs.push({module_id:curModule.id,type,contenu:blocVide(type),ordre:curBlocs.length});
  renderBlocs();
  setTimeout(()=>{const els=document.querySelectorAll('.bloc-card');els[els.length-1]?.scrollIntoView({behavior:'smooth',block:'center'})},50);
}
function delBloc(i){
  if(!confirm('Supprimer ce bloc ?'))return;
  if(curBlocs[i].id)delBlocs.push(curBlocs[i].id);
  curBlocs.splice(i,1);renderBlocs();
}
function moveBloc(i,d){
  const j=i+d;if(j<0||j>=curBlocs.length)return;
  [curBlocs[i],curBlocs[j]]=[curBlocs[j],curBlocs[i]];
  renderBlocs();dirty();
}

/* ---------- UPLOAD ---------- */
async function uploadImg(i,input){
  const f=input.files[0];if(!f)return;
  const st=document.getElementById('up-'+i);
  if(f.size>5*1024*1024){st.textContent='⚠ Image trop lourde (max 5 Mo)';st.style.color='var(--danger-text)';return;}
  st.style.color='var(--text-muted)';st.textContent='Envoi en cours…';
  const ext=(f.name.split('.').pop()||'jpg').toLowerCase().replace('jfif','jpg');
  const path=`${curModule.id}/${Date.now()}.${ext}`;
  const{error}=await db.storage.from(BUCKET).upload(path,f,{cacheControl:'3600',upsert:false});
  if(error){st.textContent='⚠ '+error.message;st.style.color='var(--danger-text)';return;}
  const{data}=db.storage.from(BUCKET).getPublicUrl(path);
  curBlocs[i].contenu.url=data.publicUrl;
  if(!curBlocs[i].contenu.alt)curBlocs[i].contenu.alt=f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
  renderBlocs();dirty();
}

/* ---------- VUE ---------- */
function renderBlocs(){
  const boutons=Object.entries(TYPES).map(([k,t])=>
    `<button class="btn addb" onclick="addBloc('${k}')" title="${t.desc}">
      <span style="font-size:14px;opacity:.6">${t.icon}</span> ${t.label}</button>`).join('');

  const cards=curBlocs.length?curBlocs.map((b,i)=>`
    <div class="question-card bloc-card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;padding-bottom:8px;border-bottom:1px solid var(--border)">
        <span class="q-badge" style="margin:0">${TYPES[b.type]?.icon||''} ${TYPES[b.type]?.label||b.type}</span>
        <div style="display:flex;gap:6px">
          ${miniBtn('↑',`moveBloc(${i},-1)`)}${miniBtn('↓',`moveBloc(${i},1)`)}${miniBtn('Suppr.',`delBloc(${i})`,1)}
        </div>
      </div>
      ${editorFor(b,i)}
    </div>`).join(''):
    `<div class="center-msg">Ce module est vide. Ajoutez un premier bloc ci-dessus.</div>`;

  app().innerHTML=`
    ${tabs('formations')}
    <button class="btn" style="margin-bottom:1rem" onclick="quitBlocs()">← ${esc(curTheme.nom)}</button>
    <div class="question-card" style="margin-bottom:1rem;background:var(--purple-light);border-color:var(--purple)">
      <h2 style="font-size:19px;color:var(--purple)">${esc(curModule.titre)}</h2>
      <p style="font-size:13px;color:var(--text-muted);margin-top:2px">${esc(curModule.accroche)}</p>
      <p style="font-size:11px;color:var(--text-light);margin-top:6px">Le titre, l'accroche et le pied de page sont générés automatiquement — inutile d'en faire des blocs.</p>
    </div>
    <div class="addbar">${boutons}</div>
    ${cards}
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:1.25rem;position:sticky;bottom:0;background:var(--bg);padding:12px 0;border-top:1px solid var(--border)">
      <button class="btn primary" onclick="saveBlocs()">Enregistrer</button>
      <button class="btn" onclick="previewModule()">Aperçu</button>
      <span id="bl-msg" class="save-status" style="margin:0;align-self:center"></span>
    </div>`;
}

function quitBlocs(){
  if(confirm('Quitter ? Les modifications non enregistrées seront perdues.')){loadModules();}
}

async function saveBlocs(){
  const msg=document.getElementById('bl-msg');
  msg.className='save-status';msg.textContent='Enregistrement…';
  try{
    if(delBlocs.length){
      const d=await db.from('bloc').delete().in('id',delBlocs);
      if(d.error)throw d.error;
      delBlocs=[];
    }
    for(let i=0;i<curBlocs.length;i++){
      const b=curBlocs[i];
      const payload={module_id:curModule.id,type:b.type,contenu:b.contenu,ordre:i};
      if(b.id){
        const r=await db.from('bloc').update(payload).eq('id',b.id);
        if(r.error)throw r.error;
      }else{
        const r=await db.from('bloc').insert(payload).select().single();
        if(r.error)throw r.error;
        b.id=r.data.id;
      }
      b.ordre=i;
    }
    msg.className='save-status ok';msg.textContent='✓ Enregistré';
  }catch(e){msg.className='save-status err';msg.textContent='⚠ '+e.message;}
}

/* ---------- APERÇU ---------- */
function mdBold(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}

function blocHTML(b){
  const c=b.contenu||{};
  switch(b.type){
    case 'texte':return `<section class="m-block">
      ${c.titre?`<h3>${esc(c.titre)}</h3>`:''}
      ${(c.paragraphes||[]).filter(p=>p.trim()).map(p=>`<p>${mdBold(p)}</p>`).join('')}</section>`;

    case 'scenes':return `<section class="m-block">
      ${c.titre?`<h3>${esc(c.titre)}</h3>`:''}
      ${(c.items||[]).map(s=>`<div class="m-scene">
        <div class="m-scene-h"><span class="m-scene-n">${esc(s.lettre)}</span><h4>${esc(s.titre)}</h4></div>
        ${s.texte?`<p>${mdBold(s.texte)}</p>`:''}
        ${s.analyse?`<p class="m-scene-r"><strong>Ce qui se passe :</strong> ${mdBold(s.analyse)}</p>`:''}
      </div>`).join('')}</section>`;

    case 'reflexion':return `<div class="m-pause">
      <div class="m-pause-label">Temps de réflexion</div>
      <p class="m-pause-q">${esc(c.question)}</p>
      ${c.sous_titre?`<p class="m-pause-sub">${esc(c.sous_titre)}</p>`:''}
      <textarea class="m-input" rows="3" placeholder="${esc(c.placeholder||'')}"></textarea>
      <p class="m-pause-note">Vos notes restent sur votre appareil. Elles ne sont ni enregistrées ni transmises.</p>
    </div>`;

    case 'retenir':return `<div class="m-key">
      <h3>${esc(c.titre||'À retenir')}</h3>
      <ul>${(c.points||[]).filter(p=>p.trim()).map(p=>`<li>${mdBold(p)}</li>`).join('')}</ul></div>`;

    case 'citation':return `<div class="m-quote">${esc(c.texte||'').replace(/\n/g,'<br>')}</div>`;

    case 'comparaison':return `
      ${c.intro?`<section class="m-block"><p>${mdBold(c.intro)}</p></section>`:''}
      <div class="m-do">
        <div class="m-do-col ok"><h5>Plutôt</h5><ul>${(c.plutot||[]).filter(x=>x.trim()).map(x=>`<li>${mdBold(x)}</li>`).join('')}</ul></div>
        <div class="m-do-col ko"><h5>À éviter</h5><ul>${(c.eviter||[]).filter(x=>x.trim()).map(x=>`<li>${mdBold(x)}</li>`).join('')}</ul></div>
      </div>`;

    case 'essayer':return `<div class="m-try">
      <div class="m-try-label">${esc(c.label||'À essayer cette semaine')}</div>
      ${c.titre?`<h3>${esc(c.titre)}</h3>`:''}
      <ol class="m-try-list">${(c.etapes||[]).map(e=>`<li>${e.titre?`<strong>${esc(e.titre)}</strong> `:''}${mdBold(e.texte||'')}</li>`).join('')}</ol>
      ${c.note?`<p class="m-try-note">${mdBold(c.note)}</p>`:''}</div>`;

    case 'image':return c.url?`<figure class="m-fig">
      <img src="${esc(c.url)}" alt="${esc(c.alt||'')}">
      ${c.legende?`<figcaption>${esc(c.legende)}</figcaption>`:''}</figure>`:'';
  }
  return '';
}

function moduleHTML(){
  const corps=curBlocs.map(blocHTML).join('\n');
  return `<div class="container">
    <div class="m-hero">
      <div class="m-tag">Thème : ${esc(curTheme.nom)}</div>
      <h2>${esc(curModule.titre)}</h2>
      ${curModule.accroche?`<p>${mdBold(curModule.accroche)}</p>`:''}
    </div>
    ${corps}
    <div class="m-end">
      <h3>Vous avez terminé ce module</h3>
      <p>Prenez le temps d'essayer ce qui vous a parlé, puis revenez-y si besoin.</p>
    </div>
    <p class="m-foot">Micro-formation Koalakids · ${esc(curTheme.nom)}</p>
  </div>`;
}

function previewModule(){
  const w=window.open('','_blank');
  if(!w)return alert('Le navigateur a bloqué la fenêtre d\'aperçu. Autorisez les fenêtres surgissantes pour ce site.');
  const base=document.querySelector('style').textContent;
  w.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Aperçu — ${esc(curModule.titre)}</title>
    <style>${base}${MOD_CSS}</style></head>
    <body>
    <header class="app-header">
      <img class="header-logo" src="${document.getElementById('logo').src}" alt="Koalakids">
      <div class="header-title"><h1>${esc(curModule.titre)}</h1><p>Micro-formation · ${esc(curTheme.nom)}</p></div>
      <div class="header-score-chip">Aperçu</div>
    </header>
    ${moduleHTML()}</body></html>`);
  w.document.close();
}


boot();
</script>

</body>
</html>
